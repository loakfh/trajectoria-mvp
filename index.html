  if(!sbOk())return;
  fetch(SUPABASE_URL+'/rest/v1/'+table,{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(data)})
    .then(r=>{if(!r.ok)r.text().then(t=>console.error(table+' POST:',r.status,t));})
    .catch(e=>console.error(table+' error:',e));
}

function sbPatch(table,col,val,data){
  if(!sbOk())return;
  fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+col+'=eq.'+val,{method:'PATCH',headers:{...SB_HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(data)})
    .then(r=>{if(!r.ok)r.text().then(t=>console.error(table+' PATCH:',r.status,t));})
    .catch(e=>console.error(table+' error:',e));
}

function getOrCreateUserId(){
  let uid=localStorage.getItem('traj_user_id');
  if(!uid){uid=crypto.randomUUID();localStorage.setItem('traj_user_id',uid);}
  return uid;
}

function parseDnaBlock(raw) {
  // Patterns 1-2: inside code blocks (backtick-anchored — handles nested objects via backtracking)
  const blockPatterns = [/\`\`\`json_dna\s*(\{[\s\S]*?\})\s*\`\`\`/, /\`\`\`json\s*(\{[\s\S]*?\})\s*\`\`\`/];
  for (const p of blockPatterns) {
    const m = raw.match(p);
    if (m) try { const parsed=JSON.parse(m[1]); console.log('DNA parsed OK:', parsed.dna_percent); return parsed; } catch(e) { console.log('DNA JSON parse error:', e.message); }
  }
  // Pattern 3: raw JSON without code block — balanced brace matching for nested objects (hidden_insights etc.)
  const idx = raw.indexOf('"dna_percent"');
  if (idx !== -1) {
    const openIdx = raw.lastIndexOf('{', idx);
    if (openIdx !== -1) {
      let depth = 0;
      for (let i = openIdx; i < raw.length; i++) {
        if (raw[i] === '{') depth++;
        else if (raw[i] === '}') { depth--; if (depth === 0) {
          try { const parsed=JSON.parse(raw.slice(openIdx, i+1)); console.log('DNA parsed OK (fallback):', parsed.dna_percent); return parsed; } catch(e) { console.log('DNA fallback parse error:', e.message); break; }
        }}
      }
    }
  }
  const fb=raw.match(/"dna_percent"\s*:\s*(\d+)/);
  if(fb){console.log('DNA number-only extract:', fb[1]); return {dna_percent:parseInt(fb[1],10)};}
  console.log('No DNA block found in response');
  return null;
}

function stripDnaBlock(raw) {
  return raw.replace(/\`\`\`json_dna[\s\S]*?\`\`\`/g,'').replace(/\`\`\`json[\s\S]*?\`\`\`/g,'').replace(/\[DIALOGUE_COMPLETE\]/g,'').trim();
}

async function callGPT(messages, retries=2) {
  for (let i=0; i<=retries; i++) {
    try {
      const r = await fetch(EDGE_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages})});
      if (!r.ok) { const t=await r.text(); throw new Error(t.slice(0,200)); }
      const d = await r.json();
      if (d.content) return d.content;
      if (d.error) throw new Error(d.error);
      throw new Error('Empty response');
    } catch(e) {
      if (i < retries) { await new Promise(r=>setTimeout(r,1500)); continue; }
      throw e;
    }
  }
}

    if (recording) {
      try { r.abort(); } catch(e) {}
      setRecording(false);
      return;
    }
    r.onresult = function(event) {
      const text = event.results[0][0].transcript;
      setInput(function(prev) { return prev + text; });
      setRecording(false);
    };
    r.onerror = function(event) {
      console.log('Speech error:', event.error);
      setRecording(false);
    };
    r.onend = function() {
      setRecording(false);
    };
    try { r.abort(); } catch(e) {}
    setTimeout(function() {
      try {
        r.start();
        setRecording(true);
      } catch(e) {
        console.log('Start error:', e);
        setRecording(false);
      }
    }, 150);
  }, [recording]);

  const randomImgRef = useRef(abstractImages[Math.floor(Math.random()*abstractImages.length)]);
  if (d) d.dnaBgImage = CRACK_TO_CLEAN[randomImgRef.current] || 'assets/вода.jpeg';
  const [clickGlow, setClickGlow] = useState(false);
  const [contactTg, setContactTg] = useState('');
  const [contactSaved, setContactSaved] = useState(false);
  const handleImageClick = () => { setClickGlow(true); setTimeout(()=>{setClickGlow(false);onDna();},600); };

  const userName = d.userName || 'Имя';
  const pilot = copilotName || 'Копилот';
  const anton = "'Anton','Impact','Arial Black',sans-serif";
  const libre = "'Libre Baskerville',serif";
  const caveat = "'Caveat',cursive";

  const handleContactSave = () => {
    if(!contactTg.trim())return;
    console.log('Contact saved:',contactTg);
    if(userId) sbPatch('users','id',userId,{contact:contactTg.trim()});
    setContactSaved(true);
  };

  const insightQuote = (d.insights&&d.insights[0]) ? d.insights[0] : null;
  const nameHalf = Math.ceil(userName.length/2);
  const namePart1 = userName.slice(0,nameHalf);
  const namePart2 = userName.slice(nameHalf);

  return React.createElement('div',{className:'page'},
    React.createElement('div',{className:'page-bg',style:{backgroundImage:'url(assets/bg-summary.png)'}}),
    React.createElement('div',{className:'nav'},React.createElement('span',{className:'nav-logo',onClick:goHome},'ТРАЕКТОРИЯ')),
    React.createElement('div',{className:'page-content resp-pad zoomable',style:{padding:'0 40px 60px',maxWidth:1500,width:'95%',margin:'0 auto'}},

      // 1. TITLE
      React.createElement('h1',{className:'hero',style:{fontFamily:anton,fontSize:'clamp(28px,4.5vw,56px)',textTransform:'uppercase',marginTop:40,marginBottom:48,fontWeight:400}},
        userName+', ',d.title||'ты знаешь о себе больше, чем думаешь'
      ),

      // 2. DNA BAR — full width
      React.createElement('div',{style:{marginBottom:48}},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:8}},
          React.createElement('div',{style:{fontFamily:anton,fontSize:16,letterSpacing:2,textTransform:'uppercase',fontWeight:400}},'ЦИФРОВОЕ ДНК'),
          React.createElement('div',{style:{fontFamily:anton,fontSize:52,color:'#fff',textShadow:'0 0 30px rgba(255,255,255,0.5)',lineHeight:1}},pct+'%')
        ),
        React.createElement('div',{style:{position:'relative',marginTop:28}},
          // marker — text above bar, line extends down through bar
          React.createElement('div',{style:{position:'absolute',left:'15%',top:-24,transform:'translateX(-50%)',fontSize:13,color:'rgba(255,255,255,0.6)',whiteSpace:'nowrap',display:'flex',flexDirection:'column',alignItems:'center'}},
            React.createElement('span',null,'большинство здесь'),
            React.createElement('div',{style:{width:1,height:30,background:'rgba(255,255,255,0.4)',marginTop:4}})
          ),
          React.createElement('div',{style:{height:18,background:'rgba(255,255,255,0.1)',borderRadius:9,overflow:'hidden'}},
            React.createElement('div',{style:{height:'100%',borderRadius:9,background:'var(--gradient)',backgroundSize:'200% 100%',animation:'dnaShimmer 3s linear infinite',width:pct+'%',transition:'width 0.8s ease'}})
          )

        React.createElement('p',{style:{fontSize:16,color:'rgba(255,255,255,0.6)',marginTop:8}},'Тво\u0451 цифровое ДНК заполнено на '+pct+'%, это ещ\u0451 не конец')
      ),

      // 3. ABSTRACT IMAGE CARD — clickable, with overlay
      React.createElement('div',{className:'summary-hero-img',onClick:handleImageClick,style:{width:'100%',height:500,borderRadius:20,overflow:'hidden',position:'relative',cursor:'pointer',transition:'transform 0.3s ease, box-shadow 0.4s ease',marginBottom:12,boxShadow:clickGlow?'0 0 80px 20px rgba(100,180,255,0.6)':undefined}},
        React.createElement('img',{src:randomImgRef.current,style:{width:'100%',height:'100%',objectFit:'cover',display:'block'},alt:'DNA abstract'}),
        React.createElement('div',{style:{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.2) 50%,transparent 100%)'}}),
        React.createElement('div',{className:'summary-name-overlay',style:{position:'absolute',bottom:0,left:0,padding:40}},
          React.createElement('div',{style:{marginBottom:0}},
            React.createElement('span',{style:{fontFamily:libre,fontSize:'clamp(32px,10vw,120px)',color:'#fff',lineHeight:1,textTransform:'uppercase',fontWeight:400}},namePart1),
            React.createElement('span',{style:{fontFamily:caveat,fontSize:'clamp(32px,10vw,120px)',color:'#c4b5fd',lineHeight:1}},namePart2)
          ),
          React.createElement('div',{style:{width:60,height:3,background:'var(--accent)',marginTop:12,marginBottom:12}}),
          React.createElement('div',{style:{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}},
            React.createElement('span',{style:{fontFamily:libre,fontSize:18,color:'var(--muted)',letterSpacing:2,textTransform:'uppercase'}},'АРХЕТИП:'),
            React.createElement('span',{style:{fontFamily:libre,fontSize:28,color:'#fff',letterSpacing:1}},d.archetype||'Искатель')
          ),
          d.superpower && React.createElement('p',{style:{fontFamily:caveat,fontSize:22,color:'rgba(255,255,255,0.7)',fontStyle:'italic',marginTop:4}},d.superpower)
        )
      ),
      React.createElement('p',{style:{textAlign:'center',fontSize:14,color:'rgba(255,255,255,0.4)',fontFamily:anton,letterSpacing:2,textTransform:'uppercase',marginBottom:48,cursor:'pointer'},onClick:handleImageClick},'Нажми чтобы открыть карту ДНК \u2192'),

      // 4. TWO-COLUMN: copilot opinion (left ~65%) + disagree (right ~35%)
      React.createElement('div',{className:'summary-opinion-row',style:{display:'flex',gap:24,marginBottom:48,flexWrap:'wrap',alignItems:'stretch'}},
        // LEFT — copilot opinion
        React.createElement('div',{style:{flex:'7 1 0',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:32,minWidth:300}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:24}},
            React.createElement('div',{style:{width:42,height:42,borderRadius:'50%',background:'var(--gradient)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},'\u2728'),
            React.createElement('div',{style:{fontFamily:anton,fontSize:20,letterSpacing:1,textTransform:'uppercase',fontWeight:400}},'МНЕНИЕ '+pilot.toUpperCase())
          ),
          React.createElement('div',{style:{fontFamily:libre,fontSize:17,color:'rgba(255,255,255,0.8)',lineHeight:1.8,marginBottom:24}},
            (d.opinion||d.title||'').split('\n').filter(l=>l.trim()).map((line,i)=>React.createElement('p',{key:i,style:{marginBottom:12}},line))
          ),
          insightQuote && React.createElement('div',{style:{borderLeft:'3px solid var(--accent)',paddingLeft:16,marginTop:8}},
            React.createElement('div',{style:{fontSize:14,color:'var(--accent)',fontFamily:anton,letterSpacing:1,textTransform:'uppercase',marginBottom:8,fontWeight:400}},'МЕЖДУ СТРОК'),
            React.createElement('p',{style:{fontFamily:caveat,fontSize:20,fontStyle:'italic',color:'rgba(255,255,255,0.8)',margin:'10px 0'}},'\u00AB',insightQuote.quote,'\u00BB'),
            React.createElement('p',{style:{fontSize:15,color:'var(--muted)'}},insightQuote.text)
          )
        ),
        // RIGHT — disagree
        React.createElement('div',{style:{flex:'3 1 0',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:24,display:'flex',flexDirection:'column',minWidth:240}},
          React.createElement('div',{style:{fontFamily:anton,fontSize:18,letterSpacing:1,textTransform:'uppercase',fontWeight:400,marginBottom:4}},'НЕ СОГЛАСЕН?'),
          React.createElement('p',{style:{fontSize:14,color:'var(--muted)',marginBottom:12}},'Результат можно изменить'),
          React.createElement('textarea',{className:'input-field',placeholder:'Напиши что хочешь изменить...',style:{width:'100%',flex:1,minHeight:100,resize:'vertical',boxSizing:'border-box',marginBottom:12}}),
          React.createElement('button',{className:'btn-outline',style:{borderColor:'#f7c948',color:'#f7c948',width:'100%',fontFamily:anton,fontWeight:400,padding:'12px 0'}},'ИЗМЕНИТЬ')
        )
      ),

      // 5. CONTACT
      React.createElement('div',{style:{textAlign:'center',padding:'48px 0'}},
        React.createElement('div',{style:{fontFamily:anton,fontSize:22,letterSpacing:2,textTransform:'uppercase',marginBottom:12,fontWeight:400}},'ОСТАЛИСЬ ВОПРОСЫ? НАПИШИ НАМ'),
        React.createElement('p',{style:{fontSize:14,color:'var(--muted)',marginBottom:16}},'Оставь контакт, наш менеджер напишет тебе'),
        !contactSaved ? React.createElement('div',{style:{display:'flex',gap:12,justifyContent:'center',alignItems:'center',flexWrap:'wrap'}},
          React.createElement('input',{style:{maxWidth:450,width:'100%',padding:'16px 24px',fontSize:16,borderRadius:50,border:'1px solid rgba(255,255,255,0.2)',background:'transparent',color:'#fff',outline:'none',fontFamily:libre},placeholder:'@telegram или email',value:contactTg,onChange:e=>setContactTg(e.target.value)}),
          React.createElement('button',{style:{background:'#fff',color:'#000',borderRadius:50,padding:'16px 32px',border:'none',fontFamily:anton,fontSize:16,letterSpacing:1,fontWeight:400,cursor:'pointer',transition:'transform 0.2s'},onClick:handleContactSave,onMouseEnter:e=>e.currentTarget.style.transform='translateY(-2px)',onMouseLeave:e=>e.currentTarget.style.transform='translateY(0)'},'ОСТАВИТЬ КОНТАКТ')
        ) : React.createElement('p',{style:{fontSize:16,color:'#22c55e'}},'\u2714 Сохранено!'),
        React.createElement('p',{style:{fontSize:13,color:'var(--muted)',marginTop:16,cursor:'pointer'},onClick:onRestart},'Начать сначала')
      )
    )

}

function BridgePage({data, onBack, goHome, copilotName}) {
  const d = data || DEMO_SUMMARY;
  const userName = d.userName || 'Имя';
  const pilot = (copilotName || 'копилот').toUpperCase();
  const [recipient, setRecipient] = useState('parent');
  const [copied, setCopied] = useState(false);
  const [msgIdx, setMsgIdx] = useState(0);
  const [maxTip, setMaxTip] = useState(false);
  const anton = "'Anton','Impact','Arial Black',sans-serif";
  const libre = "'Libre Baskerville',serif";
  const caveat = "'Caveat',cursive";
  useEffect(function(){window.scrollTo(0,0);},[]);

  var shareLink = window.location.origin;
  var bt = d.bridge_timelines || {};
  var traits = d.traits || [];
  var archetype = d.archetype || 'Искатель';
  var superpower = d.superpower || '';
  var reframe = d.reframe || {};
  var dreamText = (traits.find(function(t){return t.name==='\u041C\u0435\u0447\u0442\u0430'})||traits[0]||{text:'\u0441\u043E\u0437\u0434\u0430\u043D\u0438\u0435 \u043D\u043E\u0432\u043E\u0433\u043E'}).text;
  var fearText = (traits.find(function(t){return t.name==='\u0411\u0430\u0440\u044C\u0435\u0440\u044B'})||{text:'\u043D\u0435 \u043E\u043F\u0440\u0430\u0432\u0434\u0430\u0442\u044C \u043E\u0436\u0438\u0434\u0430\u043D\u0438\u044F'}).text;
  var reframeShort = reframe.fear ? reframe.fear.split('\u2014').pop().trim().slice(0,50) : '\u044F \u0445\u043E\u0447\u0443 \u043F\u043E\u043D\u044F\u0442\u044C';

  // Parent timelines
  var silentParent = bt.silent_path || [
    '\u041C\u0430\u043C\u0430 \u043F\u0440\u043E\u0434\u043E\u043B\u0436\u0430\u0435\u0442 \u0434\u0443\u043C\u0430\u0442\u044C \u0447\u0442\u043E \u00AB'+dreamText.toLowerCase()+'\u00BB \u2014 \u043D\u0435\u0441\u0435\u0440\u044C\u0451\u0437\u043D\u043E',
    '\u0422\u044B \u0431\u043E\u0438\u0448\u044C\u0441\u044F \u043D\u0430\u0447\u0430\u0442\u044C \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440, \u043F\u043E\u0442\u043E\u043C\u0443 \u0447\u0442\u043E \u00AB'+fearText.toLowerCase()+'\u00BB',
    '\u0427\u0435\u0440\u0435\u0437 \u0433\u043E\u0434 \u0432\u044B\u0431\u0438\u0440\u0430\u0435\u0448\u044C \u043F\u043E \u0447\u0443\u0436\u043E\u043C\u0443 \u0441\u043E\u0432\u0435\u0442\u0443. \u041D\u0435 \u043F\u043E \u0441\u0432\u043E\u0435\u043C\u0443.'
  ];
  var bridgeParent = bt.bridge_path || [
    '\u041C\u0430\u043C\u0430 \u0447\u0438\u0442\u0430\u0435\u0442: \u00AB\u0435\u0433\u043E \u0437\u0430\u0436\u0438\u0433\u0430\u0435\u0442 '+dreamText.toLowerCase()+'\u00BB \u2014 \u043F\u0440\u044F\u043C\u0430\u044F \u0446\u0438\u0442\u0430\u0442\u0430',
    superpower ? '\u0412\u043F\u0435\u0440\u0432\u044B\u0435 \u0432\u0438\u0434\u0438\u0442 \u043D\u0435 \u0441\u043B\u043E\u0432\u0430, \u0430 \u043F\u0440\u0438\u0447\u0438\u043D\u0443: \u00AB'+superpower.toLowerCase()+'\u00BB' : '\u0412\u043F\u0435\u0440\u0432\u044B\u0435 \u0432\u0438\u0434\u0438\u0442 \u043D\u0435 \u0441\u043B\u043E\u0432\u0430, \u0430 \u043F\u0440\u0438\u0447\u0438\u043D\u0443 \u2014 \u0447\u0435\u0440\u0435\u0437 \u0442\u0432\u043E\u0439 \u0433\u043E\u043B\u043E\u0441',
    '\u0420\u0430\u0437\u0433\u043E\u0432\u043E\u0440 \u043D\u0430\u0447\u0438\u043D\u0430\u0435\u0442\u0441\u044F \u043D\u0435 \u0441 \u00AB\u0442\u044B \u0434\u043E\u043B\u0436\u0435\u043D\u00BB, \u0430 \u0441 \u00AB'+reframeShort+'\u00BB'
  ];
  // Friend timelines
  var silentFriend = [
    '\u0414\u0440\u0443\u0433 \u043D\u0435 \u0437\u043D\u0430\u0435\u0442 \u0447\u0442\u043E \u00AB'+dreamText.toLowerCase()+'\u00BB \u2014 \u043D\u0435 \u0445\u043E\u0431\u0431\u0438, \u0430 \u0447\u0430\u0441\u0442\u044C \u0442\u0435\u0431\u044F',
    '\u0422\u044B \u043C\u043E\u043B\u0447\u0438\u0448\u044C, \u043F\u043E\u0442\u043E\u043C\u0443 \u0447\u0442\u043E \u00AB\u043D\u0435 \u043F\u043E\u0439\u043C\u0443\u0442\u00BB',
    '\u0427\u0435\u0440\u0435\u0437 \u0433\u043E\u0434 \u2014 \u043A\u0430\u0436\u0434\u044B\u0439 \u043F\u043E\u0448\u0451\u043B \u0441\u0432\u043E\u0435\u0439 \u0434\u043E\u0440\u043E\u0433\u043E\u0439. \u041D\u0435 \u043D\u0430 \u043E\u0434\u043D\u043E\u0439 \u0432\u043E\u043B\u043D\u0435.'
  ];
  var bridgeFriend = [
    '\u0414\u0440\u0443\u0433 \u0447\u0438\u0442\u0430\u0435\u0442: \u00AB\u0435\u0433\u043E \u0430\u0440\u0445\u0435\u0442\u0438\u043F \u2014 '+archetype+'\u00BB \u2014 \u0438 \u0443\u0437\u043D\u0430\u0451\u0442 \u0447\u0442\u043E-\u0442\u043E \u043D\u043E\u0432\u043E\u0435',
    '\u0412\u043F\u0435\u0440\u0432\u044B\u0435 \u0432\u0438\u0434\u0438\u0442 \u043D\u0435 \u043F\u0440\u0438\u043A\u043E\u043B\u044B, \u0430 \u0442\u043E \u0447\u0442\u043E \u0440\u0435\u0430\u043B\u044C\u043D\u043E \u0432\u043E\u043B\u043D\u0443\u0435\u0442 \u0442\u0435\u0431\u044F',
    '\u041D\u0430\u0447\u0438\u043D\u0430\u0435\u0442\u0441\u044F \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440, \u043A\u043E\u0442\u043E\u0440\u044B\u0439 \u0432\u044B \u0434\u0430\u0432\u043D\u043E \u043D\u0435 \u0432\u0435\u043B\u0438'
  ];

  var sLines = recipient==='parent' ? silentParent : silentFriend;
  var bLines = recipient==='parent' ? bridgeParent : bridgeFriend;
  var sAll = sLines.slice(0,3).concat(['\u041F\u0430\u0442\u0442\u0435\u0440\u043D \u043F\u043E\u0432\u0442\u043E\u0440\u044F\u0435\u0442\u0441\u044F.']);
  var bAll = bLines.slice(0,3).concat(['\u041F\u0430\u0442\u0442\u0435\u0440\u043D \u043B\u043E\u043C\u0430\u0435\u0442\u0441\u044F.']);

  // Messages
  var traitSum = traits.slice(0,2).map(function(t){return t.text.toLowerCase()}).join(', ')||'\u043A\u043E\u0435-\u0447\u0442\u043E \u0432\u0430\u0436\u043D\u043E\u0435';
  var parentMsgs = [
    (bt.parent_message||'\u041F\u0440\u0438\u0432\u0435\u0442. \u042F \u043F\u0440\u043E\u0448\u0451\u043B \u043A\u043E\u0435-\u0447\u0442\u043E \u2014 \u043D\u0435 \u0442\u0435\u0441\u0442, \u0430 \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440 \u0441 AI \u043F\u0440\u043E \u0442\u043E, \u043A\u0442\u043E \u044F \u0438 \u0447\u0435\u0433\u043E \u0445\u043E\u0447\u0443. \u041E\u043A\u0430\u0437\u0430\u043B\u043E\u0441\u044C, '+traitSum+'. \u041C\u043D\u0435 \u0432\u0430\u0436\u043D\u043E, \u0447\u0442\u043E\u0431\u044B \u0442\u044B \u044D\u0442\u043E \u0443\u0432\u0438\u0434\u0435\u043B(\u0430).')+' '+shareLink,
    '\u041C\u0430\u043C, \u044F \u043D\u0430\u0448\u0451\u043B \u0448\u0442\u0443\u043A\u0443 \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0440\u0435\u0430\u043B\u044C\u043D\u043E \u0441\u043B\u044B\u0448\u0438\u0442. \u041D\u0435 \u0442\u0435\u0441\u0442 \u2014 \u0440\u0430\u0437\u0433\u043E\u0432\u043E\u0440. \u041C\u043E\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u2014 '+archetype+'. \u041F\u043E\u0441\u043C\u043E\u0442\u0440\u0438: '+shareLink,
    '\u042F \u043D\u0435 \u043F\u0440\u043E\u0448\u0443 \u043E\u0442\u043F\u0443\u0441\u0442\u0438\u0442\u044C \u043C\u0435\u043D\u044F \u0434\u0435\u043B\u0430\u0442\u044C \u0433\u043B\u0443\u043F\u043E\u0441\u0442\u0438. \u042F \u043F\u0440\u043E\u0448\u0443 \u0434\u0430\u0442\u044C \u0448\u0430\u043D\u0441 \u0434\u0435\u043B\u0430\u0442\u044C \u0441\u0432\u043E\u0451. \u0412\u043E\u0442 \u0447\u0442\u043E \u0443\u0437\u043D\u0430\u043B \u043E \u0441\u0435\u0431\u0435: '+shareLink
  ];

function App() {
  const [page, setPage] = useState('landing');
  const [userData, setUserData] = useState({userName:'',copilotName:''});
  const [summaryData, setSummaryData] = useState(null);
  const [fullAccess, setFullAccess] = useState(false);

  const handleOnboard = async (name, copilot) => {
    // Create user in Supabase (blocking — need the id)
    const user = await sbPost('users',{name,copilot_name:copilot,source:'web_mvp'},true);
    const uId = user?.id || getOrCreateUserId();
    // Create session
    const session = await sbPost('sessions',{user_id:uId,tone_preference:'direct'},true);
    const sId = session?.id || crypto.randomUUID();
    setUserData({userName:name,copilotName:copilot,userId:uId,sessionId:sId});
    setPage('chat');
  };

  const goHome = () => { setPage('landing'); setSummaryData(null); };

  return (
    page === 'landing' ? React.createElement(Landing, {onStart: () => setPage('onboarding'), goHome}) :
    page === 'onboarding' ? React.createElement(Onboarding, {onSubmit: handleOnboard, goHome}) :
    page === 'chat' ? React.createElement(Chat, {
      userName: userData.userName,
      copilotName: userData.copilotName,
      userId: userData.userId,
      sessionId: userData.sessionId,
      onFinish: (data) => { setSummaryData(data); setPage('summary'); },
      goHome
    }) :
    page === 'summary' ? React.createElement(Summary, {
      data: summaryData,
      copilotName: userData.copilotName,
      userId: userData.userId,
      onBridge: () => setPage('bridge'),
      onDna: () => setPage('dna'),
      onStore: () => setPage('store'),
      onRestart: () => { setPage('landing'); setSummaryData(null); },
      goHome
    }) :
    page === 'dna' ? React.createElement(DnaPage, {
      data: summaryData,
      fullAccess: fullAccess,
      onBack: () => setPage('summary'),
      onStore: () => setPage('store'),
      onBridge: () => setPage('bridge'),
      goHome,
      copilotName: userData.copilotName
    }) :
    page === 'store' ? React.createElement(StorePage, {
      data: summaryData,
      onBack: () => setPage('summary'),
      onBridge: () => setPage('bridge'),
      onUnlock: () => { setFullAccess(true); setPage('dna'); },
      goHome
    }) :
    page === 'bridge' ? React.createElement(BridgePage, {
      data: summaryData,
      onBack: () => setPage('summary'),
      goHome,
      copilotName: userData.copilotName
    }) : null
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
